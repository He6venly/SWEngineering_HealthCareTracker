services:
  - type: web
    name: cwnu14-healthcare-backend
    runtime: docker
    plan: free
    dockerfilePath: CWNU14_HealthCare/Dockerfile
    dockerContext: CWNU14_HealthCare
    healthCheckPath: /api/v1/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_VALIDITY_IN_SECONDS
        value: 86400
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173,https://sw-engineering-health-care-tracker.vercel.app
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        value: https://*.vercel.app
      - key: LLM_PROVIDER
        value: auto
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_FALLBACK_MODELS
        value: gemini-2.5-flash,gemini-2.0-flash,gemini-flash-latest
